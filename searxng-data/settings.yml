# SearxNG Settings for AI Search Engine

use_default_settings: true
server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "ai_chatbot_secret_key_12345" 
  base_url: false 
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
