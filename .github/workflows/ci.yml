name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt pytest httpx pytest-asyncio pytest-cov
      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null | head -1)" ]; then
            python -m pytest tests/ -v --tb=short --cov=app
          else
            echo "⚠️  No test files found in tests/ — skipping pytest"
            echo "   (tests/ is excluded from the repository via .gitignore)"
          fi
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./test_ci.db

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
